name: App Build and Release

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to build
        default: dev
        required: true
  push:
    tags:
      - 'release-v*'

env:
  DOTNET_VERSION: 8.0.x
  DESKTOP_PROJECT: Companion.Desktop/Companion.Desktop.csproj
  TEST_PROJECT: Companion.Tests/Companion.Tests.csproj
  APP_NAME: Companion

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            os_name: macos
            rid: osx-arm64
            artifact_name: Companion-macos-arm64
            package_type: dmg

          - runner: windows-latest
            os_name: windows
            rid: win-x64
            artifact_name: Companion-windows-x64
            package_type: zip

          - runner: windows-latest
            os_name: windows
            rid: win-arm64
            artifact_name: Companion-windows-arm64
            package_type: zip

          - runner: ubuntu-latest
            os_name: linux
            rid: linux-x64
            artifact_name: Companion-linux-x64
            package_type: zip
            run_tests: true

          - runner: ubuntu-latest
            os_name: linux
            rid: linux-arm64
            artifact_name: Companion-linux-arm64
            package_type: zip

    steps:
      - name: Free Disk Space (Ubuntu)
        if: matrix.runner == 'ubuntu-latest'
        shell: bash
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          sudo apt clean
          df -h

      - name: Free Disk Space (macOS)
        if: matrix.runner == 'macos-latest'
        shell: bash
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache /usr/local/share/powershell /usr/local/share/chromium /opt/CodeQL || true
          brew cleanup || true
          brew autoremove || true
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_branch || github.ref_name }}
          fetch-depth: 0

      - name: Ensure full git history
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse --is-shallow-repository | grep -q true; then
            git fetch --prune --unshallow --tags
          else
            git fetch --prune --tags
          fi

      - name: Derive Release Version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/release-v* ]]; then
            RELEASE_VERSION="${GITHUB_REF#refs/tags/release-v}"
          elif [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            RELEASE_VERSION="${GITHUB_REF#refs/tags/v}"
          else
            RELEASE_VERSION="0.0.0-dev+$(git rev-parse --short HEAD)"
          fi

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION_WITH_V=v$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "PUBLISH_DIR=$GITHUB_WORKSPACE/artifacts/publish/${{ matrix.rid }}" >> "$GITHUB_ENV"
          echo "PACKAGE_DIR=$GITHUB_WORKSPACE/artifacts/package/${{ matrix.artifact_name }}" >> "$GITHUB_ENV"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.os_name }}" == "windows" ]]; then
            dotnet restore "${{ env.DESKTOP_PROJECT }}" \
              -r "${{ matrix.rid }}" \
              -p:PublishReadyToRun=true
          else
            dotnet restore "${{ env.DESKTOP_PROJECT }}" \
              -r "${{ matrix.rid }}"
          fi

      - name: Run tests
        if: matrix.run_tests == true
        shell: bash
        run: |
          dotnet test "${{ env.TEST_PROJECT }}" \
            --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=test-results.trx"

      - name: Publish
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$PUBLISH_DIR"
          mkdir -p "$PUBLISH_DIR"

          if [[ "${{ matrix.os_name }}" == "windows" ]]; then
            dotnet publish "${{ env.DESKTOP_PROJECT }}" \
              -c Release \
              -r "${{ matrix.rid }}" \
              --self-contained true \
              --output "$PUBLISH_DIR" \
              --no-restore \
              -p:PublishSingleFile=false \
              -p:PublishReadyToRun=true \
              -p:IncludeNativeLibrariesForSelfExtract=true
          elif [[ "${{ matrix.os_name }}" == "macos" ]]; then
            dotnet publish "${{ env.DESKTOP_PROJECT }}" \
              -c Release \
              -r "${{ matrix.rid }}" \
              --self-contained true \
              --output "$PUBLISH_DIR" \
              --no-restore \
              -p:PublishSingleFile=false \
              -p:PublishReadyToRun=false \
              -p:UseAppHost=true
          else
            dotnet publish "${{ env.DESKTOP_PROJECT }}" \
              -c Release \
              -r "${{ matrix.rid }}" \
              --self-contained true \
              --output "$PUBLISH_DIR" \
              --no-restore \
              -p:PublishSingleFile=true
          fi

      - name: Normalize VERSION in publish output
        shell: bash
        run: |
          set -euo pipefail
          echo "${RELEASE_VERSION_WITH_V}" > "${PUBLISH_DIR}/VERSION"

      - name: Rename Linux desktop binary
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "${PUBLISH_DIR}/Companion.Desktop" ]]; then
            mv "${PUBLISH_DIR}/Companion.Desktop" "${PUBLISH_DIR}/Companion.DesktopApp"
            chmod +x "${PUBLISH_DIR}/Companion.DesktopApp"
          fi

      - name: Decode signing certificate
        if: matrix.os_name == 'macos'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE:-}" ]]; then
            echo "No APPLE_CERTIFICATE; skipping signing setup."
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > macos_signing_cert.p12

      - name: Create and manage custom keychain
        if: matrix.os_name == 'macos'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          MY_KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_CERTIFICATE:-}" ]]; then
            echo "No APPLE_CERTIFICATE; skipping keychain setup."
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          security create-keychain -p "$MY_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MY_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import macos_signing_cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -s -k "$MY_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Verify codesigning identity is present
        if: matrix.os_name == 'macos'
        shell: bash
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail

          if [[ -z "${KEYCHAIN_PATH:-}" || -z "${CODESIGN_IDENTITY:-}" ]]; then
            echo "Signing identity or keychain not configured."
            exit 0
          fi

          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true

          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -Fq "$CODESIGN_IDENTITY"; then
            echo "ERROR: Identity not found in keychain: $CODESIGN_IDENTITY"
            exit 1
          fi

      - name: Verify macOS publish contents
        if: matrix.os_name == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          test -f "${PUBLISH_DIR}/Companion.Desktop"
          test -f "${PUBLISH_DIR}/Companion.Desktop.deps.json"
          test -f "${PUBLISH_DIR}/libhostfxr.dylib"
          test -f "${PUBLISH_DIR}/libhostpolicy.dylib"
          test -f "${PUBLISH_DIR}/libcoreclr.dylib"

      - name: Package macOS app and DMG
        if: matrix.os_name == 'macos'
        shell: bash
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail

          ICON_SRC="./Companion/Assets/Icons/OpenIPC.icns"
          APP_DIR="${PACKAGE_DIR}/Companion.app"
          DMG_PATH="$GITHUB_WORKSPACE/${{ matrix.artifact_name }}.dmg"

          rm -rf "$PACKAGE_DIR"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"

          ditto "$PUBLISH_DIR" "$APP_DIR/Contents/MacOS"
          [[ -f "$ICON_SRC" ]] && cp "$ICON_SRC" "$APP_DIR/Contents/Resources/OpenIPC.icns" || true

          chmod +x "$APP_DIR/Contents/MacOS/Companion.Desktop"

          cat > "$APP_DIR/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>${APP_NAME}</string>
            <key>CFBundleDisplayName</key><string>${APP_NAME}</string>
            <key>CFBundleExecutable</key><string>Companion.Desktop</string>
            <key>CFBundleIdentifier</key><string>org.openipc.Companion</string>
            <key>CFBundleVersion</key><string>${RELEASE_VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${RELEASE_VERSION}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>13.0</string>
            <key>CFBundleIconFile</key><string>OpenIPC.icns</string>
          </dict>
          </plist>
          EOF

          echo "${RELEASE_VERSION_WITH_V}" > "$APP_DIR/Contents/MacOS/VERSION"

          if [[ -n "${CODESIGN_IDENTITY:-}" && -n "${KEYCHAIN_PATH:-}" ]]; then
            codesign --keychain "$KEYCHAIN_PATH" \
                     --deep --force --verify --verbose \
                     --options runtime \
                     --timestamp \
                     --sign "${CODESIGN_IDENTITY}" "$APP_DIR"

            codesign --verify --deep --strict --verbose=4 "$APP_DIR"
            spctl --assess --type execute --verbose=4 "$APP_DIR" || true
          fi

          rm -f "$DMG_PATH"
          rm -rf dmg_build
          mkdir -p dmg_build
          ditto "$APP_DIR" "dmg_build/Companion.app"
          ln -s /Applications dmg_build/Applications

          hdiutil create \
            -volname "Companion" \
            -srcfolder dmg_build \
            -ov -format UDZO -fs HFS+ \
            "$DMG_PATH"

      - name: Notarize and staple macOS DMG
        if: matrix.os_name == 'macos'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          DMG_NAME="${{ matrix.artifact_name }}.dmg"

          if [[ -z "${APPLE_ID:-}" || -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" || -z "${APPLE_TEAM_ID:-}" ]]; then
            if [[ "${GITHUB_REF:-}" == refs/tags/release-v* ]]; then
              echo "ERROR: Missing notarization secrets for tagged release."
              exit 1
            fi
            echo "No notarization credentials configured; skipping notarization."
            exit 0
          fi

          SUBMISSION_OUTPUT="$(xcrun notarytool submit "$DMG_NAME" \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait \
            --output-format json)"

          echo "${SUBMISSION_OUTPUT}"

          SUBMISSION_ID="$(echo "${SUBMISSION_OUTPUT}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"
          SUBMISSION_STATUS="$(echo "${SUBMISSION_OUTPUT}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])')"

          if [[ "${SUBMISSION_STATUS}" != "Accepted" ]]; then
            xcrun notarytool log "${SUBMISSION_ID}" \
              --apple-id "${APPLE_ID}" \
              --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
              --team-id "${APPLE_TEAM_ID}" || true
            exit 1
          fi

          xcrun stapler staple "$DMG_NAME"
          xcrun stapler validate "$DMG_NAME"

      - name: Package Linux
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR"
          cp -R "$PUBLISH_DIR"/. "$PACKAGE_DIR"/
          (cd "$GITHUB_WORKSPACE/artifacts/package" && zip -r "${{ matrix.artifact_name }}.zip" "${{ matrix.artifact_name }}")

      - name: Package Windows
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          $publishDir = "$env:PUBLISH_DIR"
          $packageDir = "$env:PACKAGE_DIR"
          if (Test-Path $packageDir) { Remove-Item $packageDir -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "$publishDir\*" $packageDir -Recurse -Force

      - name: Windows - set icon
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          $icon = ".\Companion\Assets\Icons\OpenIPC.ico"
          choco install rcedit -y
          if (Test-Path "$env:PACKAGE_DIR\Companion.Desktop.exe") {
            rcedit "$env:PACKAGE_DIR\Companion.Desktop.exe" --set-icon $icon
          }

      - name: Zip Windows package
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "$env:PACKAGE_DIR\*" -DestinationPath "$env:GITHUB_WORKSPACE\artifacts\package\${{ matrix.artifact_name }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            artifacts/package/${{ matrix.artifact_name }}.zip
            ${{ matrix.artifact_name }}.dmg
          if-no-files-found: ignore

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release_files
          find ./artifacts -type f \( -name '*.zip' -o -name '*.dmg' \) -exec cp {} ./release_files/ \;
          ls -la ./release_files

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## Companion (OpenIPC Multiplatform Configurator)

            ### Downloads
            * **Windows**: `Companion-windows-x64.zip` / `Companion-windows-arm64.zip`
            * **macOS**: `Companion-macos-arm64.dmg`
            * **Linux**: `Companion-linux-x64.zip` / `Companion-linux-arm64.zip`

            ### Install
            * **Windows**: unzip and run `Companion.Desktop.exe`
            * **macOS**: open `.dmg` and drag **Companion.app** to Applications
            * **Linux**: unzip and run `./Companion.DesktopApp`
          files: |
            ./release_files/*.zip
            ./release_files/*.dmg

      - name: Read version from tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#release-v}
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Generate latest.json
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RELEASE_BODY="$(gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json body --jq .body)"

          jq -n \
            --arg version "${VERSION}" \
            --arg notes "${RELEASE_BODY}" \
            --arg url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}" \
            '{
              version: $version,
              release_notes: $notes,
              download_url: $url
            }' > ./release_files/latest.json

      - name: Upload latest.json
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" ./release_files/latest.json --repo "${GITHUB_REPOSITORY}" --clobber
